name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH
      - name: Unzip project
        run: |
          ZIP=$(ls *.zip | head -1)
          FOLDER=$(unzip -Z1 "$ZIP" | head -1 | cut -d/ -f1)
          unzip "$ZIP" -d project
          echo "PROJECT_DIR=project/$FOLDER" >> $GITHUB_ENV
      - name: Apply custom icon
        run: |
          set +e
          ICON_SRC=''
          [ -f app_icon.png ] && ICON_SRC='app_icon.png'
          if [ -n "$ICON_SRC" ]; then
            for DPI in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              DEST="$PROJECT_DIR/app/src/main/res/mipmap-$DPI"
              mkdir -p "$DEST"
              cp "$ICON_SRC" "$DEST/ic_launcher.png" 2>/dev/null || true
              cp "$ICON_SRC" "$DEST/ic_launcher_round.png" 2>/dev/null || true
            done
          fi
          set -e
      - name: Create fallback icons
        run: |
          python3 -c "
          import os, struct, zlib
          def make_png(size):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''
              for y in range(size):
                  raw += b'\x00'
                  for x in range(size):
                      raw += b'\x4c\xaf\x50\xff'
              compressed = zlib.compress(raw)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)) +
                      chunk(b'IDAT', compressed) +
                      chunk(b'IEND', b''))
          for dpi in ['mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi']:
              pdir = os.environ.get('PROJECT_DIR','project/app')
              path = pdir + '/app/src/main/res/mipmap-' + dpi
              os.makedirs(path, exist_ok=True)
              for nm in ['ic_launcher.png','ic_launcher_round.png']:
                  dest = path + '/' + nm
                  if not os.path.exists(dest):
                      open(dest,'wb').write(make_png(48))
          print('Icons ready')
          "
      - name: Build APK
        run: |
          cd $PROJECT_DIR
          gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
